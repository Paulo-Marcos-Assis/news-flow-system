<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esfinge Data Viewer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }
        .header {
            background: #16213e;
            padding: 1rem 2rem;
            border-bottom: 2px solid #0f3460;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            color: #e94560;
            font-size: 1.5rem;
        }
        .controls {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        select, button, input[type="file"] {
            padding: 0.5rem 1rem;
            border-radius: 6px;
            border: 1px solid #0f3460;
            background: #1a1a2e;
            color: #eee;
            cursor: pointer;
        }
        button {
            background: #e94560;
            border: none;
            font-weight: bold;
        }
        button:hover {
            background: #ff6b6b;
        }
        .main {
            display: flex;
            height: calc(100vh - 60px);
        }
        .panel {
            flex: 1;
            border-right: 1px solid #0f3460;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .panel:last-child {
            border-right: none;
        }
        .panel-header {
            background: #16213e;
            padding: 0.75rem 1rem;
            font-weight: bold;
            border-bottom: 1px solid #0f3460;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .panel-header .title {
            color: #00d9ff;
        }
        .panel-header .stats {
            font-size: 0.85rem;
            color: #888;
        }
        .panel-content {
            flex: 1;
            overflow: auto;
            padding: 1rem;
        }
        .json-viewer {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.85rem;
            line-height: 1.5;
        }
        .json-key {
            color: #e94560;
        }
        .json-string {
            color: #7bed9f;
        }
        .json-number {
            color: #70a1ff;
        }
        .json-boolean {
            color: #ffa502;
        }
        .json-null {
            color: #888;
        }
        .json-bracket {
            color: #888;
        }
        .collapsible {
            cursor: pointer;
            user-select: none;
        }
        .collapsible:hover {
            background: rgba(255,255,255,0.05);
        }
        .collapsed > .json-children {
            display: none;
        }
        .collapsed > .collapse-indicator::before {
            content: '▶ ';
        }
        .collapse-indicator::before {
            content: '▼ ';
            color: #888;
        }
        .entity-header {
            background: #0f3460;
            padding: 0.5rem 0.75rem;
            margin: 0.5rem 0;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }
        .entity-header:hover {
            background: #1a4a7a;
        }
        .entity-name {
            color: #00d9ff;
            font-weight: bold;
        }
        .entity-count {
            color: #888;
            font-size: 0.85rem;
        }
        .entity-content {
            margin-left: 1rem;
            padding-left: 1rem;
            border-left: 2px solid #0f3460;
        }
        .hidden {
            display: none;
        }
        .diff-added {
            background: rgba(123, 237, 159, 0.2);
        }
        .diff-removed {
            background: rgba(233, 69, 96, 0.2);
        }
        .diff-changed {
            background: rgba(255, 165, 2, 0.2);
        }
        .record-selector {
            padding: 0.5rem 1rem;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .record-btn {
            padding: 0.25rem 0.5rem;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .record-btn:hover, .record-btn.active {
            background: #e94560;
            border-color: #e94560;
        }
        .load-section {
            padding: 2rem;
            text-align: center;
        }
        .load-section p {
            margin-bottom: 1rem;
            color: #888;
        }
        .drop-zone {
            border: 2px dashed #0f3460;
            border-radius: 8px;
            padding: 2rem;
            margin: 1rem;
            cursor: pointer;
        }
        .drop-zone:hover {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.1);
        }
        .field-row {
            display: flex;
            padding: 0.25rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .field-row:hover {
            background: rgba(255,255,255,0.03);
        }
        .field-key {
            color: #e94560;
            min-width: 200px;
            padding-right: 1rem;
        }
        .field-value {
            color: #7bed9f;
            word-break: break-all;
        }
        .field-value.number {
            color: #70a1ff;
        }
        .nested-list {
            margin-top: 0.5rem;
        }
        .nested-item {
            background: rgba(0,0,0,0.2);
            border-radius: 4px;
            padding: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .tabs {
            display: flex;
            border-bottom: 1px solid #0f3460;
        }
        .tab {
            padding: 0.5rem 1rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        .tab:hover {
            background: rgba(255,255,255,0.05);
        }
        .tab.active {
            border-bottom-color: #e94560;
            color: #e94560;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔍 Esfinge Data Viewer</h1>
        <div class="controls">
            <input type="file" id="folderInput" webkitdirectory multiple style="display:none">
            <button onclick="document.getElementById('folderInput').click()">📁 Load Test Folder</button>
            <button onclick="loadSampleData()">📄 Load Sample</button>
        </div>
    </div>
    
    <div class="record-selector" id="recordSelector"></div>
    
    <div class="main">
        <div class="panel">
            <div class="panel-header">
                <span class="title">Collector Output</span>
                <span class="stats" id="collectorStats">-</span>
            </div>
            <div class="panel-content" id="collectorPanel">
                <div class="load-section">
                    <p>Load data to view collector output</p>
                </div>
            </div>
        </div>
        
        <div class="panel">
            <div class="panel-header">
                <span class="title">Offline Processor</span>
                <span class="stats" id="offlineStats">-</span>
            </div>
            <div class="panel-content" id="offlinePanel">
                <div class="load-section">
                    <p>Load data to view offline processor output</p>
                </div>
            </div>
        </div>
        
        <div class="panel">
            <div class="panel-header">
                <span class="title">Flow Processor</span>
                <span class="stats" id="flowStats">-</span>
            </div>
            <div class="panel-content" id="flowPanel">
                <div class="load-section">
                    <p>Load data to view flow processor output</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let data = {
            collector: [],
            offline: [],
            flow: []
        };
        let currentRecord = 0;

        document.getElementById('folderInput').addEventListener('change', handleFolderSelect);

        async function handleFolderSelect(event) {
            const files = Array.from(event.target.files);
            
            data = { collector: [], offline: [], flow: [] };
            
            for (const file of files) {
                const path = file.webkitRelativePath;
                const content = await file.text();
                
                try {
                    const json = JSON.parse(content);
                    
                    if (path.includes('collector_output')) {
                        data.collector.push({ name: file.name, data: json });
                    } else if (path.includes('processor_offline_output')) {
                        data.offline.push({ name: file.name, data: json });
                    } else if (path.includes('processor_flow_output')) {
                        data.flow.push({ name: file.name, data: json });
                    }
                } catch (e) {
                    console.log('Skipping non-JSON file:', file.name);
                }
            }
            
            // Sort by filename
            data.collector.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));
            data.offline.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));
            data.flow.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));
            
            renderRecordSelector();
            selectRecord(0);
        }

        function loadSampleData() {
            // Sample data for demonstration
            const sampleCollector = {
                "entity_type": "processo_licitatorio",
                "data_source": "esfinge",
                "processo_licitatorio": {
                    "id_procedimento_lictatorio": 1668790,
                    "numero_edital": "PE001/2020",
                    "descricao_objeto_licitacao": "Aquisição de materiais de escritório",
                    "valor_total_previsto": "50000.00",
                    "data_abertura_certame": "2020-02-24",
                    "item_licitacao": [
                        {"id_item_licitacao": 12345, "descricao_item_licitacao": "Papel A4"},
                        {"id_item_licitacao": 12346, "descricao_item_licitacao": "Canetas"}
                    ],
                    "participante_licitacao": [
                        {"nome_participante": "Empresa ABC", "codigo_cic_participante": "12345678000100"}
                    ],
                    "empenho": [
                        {"id_empenho": 98765, "valor_empenho": "25000.00"}
                    ],
                    "contrato": [
                        {"id_contrato": 55555, "numero_contrato": "001/2020"}
                    ]
                }
            };
            
            const sampleOffline = {
                "entity_type": "processo_licitatorio",
                "processo_licitatorio": {
                    "id": 1668790,
                    "numero_edital": "PE001/2020",
                    "objeto": "Aquisição de materiais de escritório",
                    "valor_estimado": 50000.00,
                    "item_licitacao": [
                        {"id": 12345, "descricao": "Papel A4", "pessoa": []},
                        {"id": 12346, "descricao": "Canetas", "pessoa": []}
                    ]
                }
            };
            
            data = {
                collector: [{ name: 'sample.json', data: sampleCollector }],
                offline: [{ name: 'sample.json', data: sampleOffline }],
                flow: [{ name: 'sample.json', data: sampleOffline }]
            };
            
            renderRecordSelector();
            selectRecord(0);
        }

        function renderRecordSelector() {
            const selector = document.getElementById('recordSelector');
            const maxRecords = Math.max(data.collector.length, data.offline.length, data.flow.length);
            
            if (maxRecords === 0) {
                selector.innerHTML = '<span style="color:#888">No records loaded</span>';
                return;
            }
            
            let html = '';
            for (let i = 0; i < maxRecords; i++) {
                const procId = data.collector[i]?.data?.processo_licitatorio?.id_procedimento_lictatorio || (i + 1);
                html += `<button class="record-btn ${i === currentRecord ? 'active' : ''}" onclick="selectRecord(${i})">#${i + 1} (${procId})</button>`;
            }
            selector.innerHTML = html;
        }

        function selectRecord(index) {
            currentRecord = index;
            renderRecordSelector();
            
            renderPanel('collectorPanel', 'collectorStats', data.collector[index]?.data, 'Collector');
            renderPanel('offlinePanel', 'offlineStats', data.offline[index]?.data, 'Offline');
            renderPanel('flowPanel', 'flowStats', data.flow[index]?.data, 'Flow');
        }

        function renderPanel(panelId, statsId, jsonData, label) {
            const panel = document.getElementById(panelId);
            const stats = document.getElementById(statsId);
            
            if (!jsonData) {
                panel.innerHTML = '<div class="load-section"><p>No data for this record</p></div>';
                stats.textContent = '-';
                return;
            }
            
            const fieldCount = countFields(jsonData);
            stats.textContent = `${fieldCount} fields`;
            
            panel.innerHTML = renderEntity(jsonData);
        }

        function countFields(obj, count = 0) {
            if (typeof obj !== 'object' || obj === null) return 1;
            if (Array.isArray(obj)) {
                return obj.reduce((acc, item) => acc + countFields(item), 0);
            }
            return Object.values(obj).reduce((acc, val) => acc + countFields(val), 0);
        }

        function renderEntity(data, depth = 0) {
            if (data === null) return '<span class="json-null">null</span>';
            if (typeof data !== 'object') {
                if (typeof data === 'string') return `<span class="json-string">"${escapeHtml(data)}"</span>`;
                if (typeof data === 'number') return `<span class="json-number">${data}</span>`;
                if (typeof data === 'boolean') return `<span class="json-boolean">${data}</span>`;
                return escapeHtml(String(data));
            }
            
            if (Array.isArray(data)) {
                if (data.length === 0) return '<span class="json-bracket">[]</span>';
                
                let html = `<div class="nested-list">`;
                data.forEach((item, i) => {
                    html += `<div class="nested-item">
                        <div style="color:#888;font-size:0.8rem;margin-bottom:0.25rem">[${i}]</div>
                        ${renderEntity(item, depth + 1)}
                    </div>`;
                });
                html += '</div>';
                return html;
            }
            
            // Object
            const entries = Object.entries(data);
            if (entries.length === 0) return '<span class="json-bracket">{}</span>';
            
            let html = '';
            const simpleFields = [];
            const complexFields = [];
            
            entries.forEach(([key, value]) => {
                if (typeof value === 'object' && value !== null && (Array.isArray(value) ? value.length > 0 : Object.keys(value).length > 0)) {
                    complexFields.push([key, value]);
                } else {
                    simpleFields.push([key, value]);
                }
            });
            
            // Render simple fields first
            simpleFields.forEach(([key, value]) => {
                html += `<div class="field-row">
                    <span class="field-key">${escapeHtml(key)}</span>
                    <span class="field-value ${typeof value === 'number' ? 'number' : ''}">${renderValue(value)}</span>
                </div>`;
            });
            
            // Render complex fields with collapsible sections
            complexFields.forEach(([key, value]) => {
                const isArray = Array.isArray(value);
                const count = isArray ? value.length : Object.keys(value).length;
                const label = isArray ? `${count} items` : `${count} fields`;
                
                html += `<div class="entity-section">
                    <div class="entity-header" onclick="this.parentElement.classList.toggle('collapsed')">
                        <span class="entity-name"><span class="collapse-indicator"></span>${escapeHtml(key)}</span>
                        <span class="entity-count">${label}</span>
                    </div>
                    <div class="entity-content json-children">
                        ${renderEntity(value, depth + 1)}
                    </div>
                </div>`;
            });
            
            return html;
        }

        function renderValue(value) {
            if (value === null) return '<span class="json-null">null</span>';
            if (typeof value === 'string') return escapeHtml(value);
            if (typeof value === 'number') return value;
            if (typeof value === 'boolean') return `<span class="json-boolean">${value}</span>`;
            if (Array.isArray(value) && value.length === 0) return '[]';
            if (typeof value === 'object' && Object.keys(value).length === 0) return '{}';
            return escapeHtml(JSON.stringify(value));
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
    </script>
</body>
</html>
